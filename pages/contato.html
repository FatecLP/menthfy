<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Menthfy</title>
    <link rel="stylesheet" href="/src/styles/components/style.css">
    <link rel="stylesheet" href="/src/styles/pages/contato.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/src/styles/components/header.css">
    <link rel="stylesheet" href="/src/styles/components/footer.css">
    <link rel="stylesheet" href="/src/styles/pages/contato.css">
</head>
<body>
    <header>
        <h1>menthfy</h1>
        <div class="header-1">
            <ul>
                <li id="li1"><a href="/">Home</a></li>
                <li id="li2"><a href="/catalogo">Catálogo</a></li>
                <li id="li3"><a href="/contato">Contato</a></li>
            </ul>
            <div></div>
        </div>
    </header>

    <main class="container">
        <section class="contact-section">
            <h2>Entre em Contato</h2>
            <p>Tem dúvidas? Entre em contato com nosso suporte</p>

            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="subject">Assunto:</label>
                    <input type="text" id="subject" name="subject" required placeholder="Assunto da mensagem">
                </div>

                <div class="form-group">
                    <label for="description">Descrição:</label>
                    <textarea id="description" name="description" rows="6" required placeholder="Descreva seu problema ou dúvida..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar</button>
            </form>
        </section>
    </main>

    <div class="footer-1">
        <div class="footer-left">
            <h1>menthfy</h1>
        </div>
        <div class="footer-center">
            <div class="icones">
                <a href=""><img src="/public/assets/icons/facebook.png" alt="Facebook"></a>
                <a href=""><img src="/public/assets/icons/instagram.png" alt="Instagram"></a>
                <a href=""><img src="/public/assets/icons/youtube-app-white-icon 1.png" alt="YouTube"></a>
                <a href=""><img src="/public/assets/icons/x.png" alt="X"></a>
                <a href=""><img src="/public/assets/icons/in.png" alt="LinkedIn"></a>
            </div>
            <span class="footer-copy">Copyright &copy; 2026 | Menthfy - Todos os direitos reservados.</span>
        </div>
        <div class="footer-right">
            <a href="#" class="topo-btn">Topo</a>
        </div>
    </div>
    
    <script type="module" src="/src/scripts/modules/header-auth.js"></script>
    <script src="/src/scripts/modules/contato.js"></script>
</body>
</html>
