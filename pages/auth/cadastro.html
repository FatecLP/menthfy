<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/src/styles/components/header.css">
    <link rel="stylesheet" href="/src/styles/pages/cadastro.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"/>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
    <header>
        <h1>menthfy</h1>
        <div class="header-1">
            <ul>
                <li id="li1"><a href="/">Home</a></li>
                <li id="li2"><a href="/catalogo">Catálogo</a></li>
                <li id="li3"><a href="/contato">Contato</a></li>
            </ul>
            <div></div>
        </div>
    </header>
    <main class="split-screen">
        <section class="split-left"></section>
        <section class="split-right">
            <form class="cadastro-container" id="cadastroForm">

            <h2 class="text-center mb-3">Criar conta</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="username" class="form-label">Nome de usuário</label>
                    <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="32" placeholder="Seu nome de usuário">
                </div>
                <div class="form-group">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf" name="cpf" required inputmode="numeric" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" maxlength="14" placeholder="000.000.000-00">
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" name="email" required autocomplete="username" placeholder="seu@email.com">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <div class="password-input-wrap">
                        <input type="password" class="form-control" id="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Sua senha">
                        <img class="password-toggle-icon" data-target="password" src="https://www.svgrepo.com/show/380007/eye-password-hide.svg" alt="Mostrar senha" title="Mostrar senha" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirmar Senha</label>
                    <div class="password-input-wrap">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="6" autocomplete="new-password" placeholder="Repetir senha">
                        <img class="password-toggle-icon" data-target="confirmPassword" src="https://www.svgrepo.com/show/380007/eye-password-hide.svg" alt="Mostrar senha" title="Mostrar senha" />
                    </div>
                    <small id="passwordMatchMessage" class="text-danger" style="display:none;">As senhas não coincidem.</small>
                </div>
            </div>
            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo de usuário</label>
                <select id="tipo" name="tipo" class="form-select" required>
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
            <div class="form-actions">
                <a href="/login">Já tenho conta</a>
                <a href="/recuperar">Esqueci a senha</a>
            </div>
        </form>
        </section>
    </main>
    <div class="footer-1">
        <div class="footer-left">
            <h1>menthfy</h1>
        </div>
        <div class="footer-center">
            <div class="icones">
                <a href=""><img src="/public/assets/icons/facebook.png" alt="Facebook"></a>
                <a href=""><img src="/public/assets/icons/instagram.png" alt="Instagram"></a>
                <a href=""><img src="/public/assets/icons/x.png" alt="X (Twitter)"></a>
                <a href=""><img src="/public/assets/icons/in.png" alt="LinkedIn"></a>
                <a href=""><img src="/public/assets/icons/youtube-app-white-icon 1.png" alt="YouTube"></a>
        </div>
        <span class="footer-copy">Copyright &copy; 2026 | Menthfy - Todos os direitos reservados.</span>
    </div>
    <div class="footer-right">
        <a href="#" class="topo-btn">Topo</a>
    </div>
    </div>
    <link rel="stylesheet" href="/src/styles/components/footer.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/scripts/modules/header-auth.js"></script>
    <script type="module" src="/src/scripts/modules/cadastro.js"></script>
</body>
</html>
