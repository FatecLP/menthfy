<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/src/styles/components/header.css">
    <link rel="stylesheet" href="/src/styles/pages/login.css">
    <link rel="stylesheet" href="/src/styles/components/footer.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"/>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
    <header>
        <h1>menthfy</h1>
        <div class="header-1">
            <ul>
                <li id="li1"><a href="/">Home</a></li>
                <li id="li2"><a href="/catalogo">Catálogo</a></li>
                <li id="li3"><a href="/contato">Contato</a></li>
            </ul>
            <div></div>
        </div>
    </header>
    <main class="split-screen">
        <section class="split-left"></section>
        <section class="split-right">
            <form class="login-container" id="loginForm">
                <h2 class="text-center mb-3">Entrar na sua conta</h2>
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" required autocomplete="username" placeholder="seu@email.com">
                </div>
                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" required autocomplete="current-password" placeholder="Sua senha">
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                <div class="form-actions">
                    <a href="/recuperar">Esqueci a senha</a>
                    <a href="/cadastro">Cadastrar</a>
                </div>
            </form>
        </section>
    </main>
    <div class="footer-1">
        <div class="footer-left">
            <h1>menthfy</h1>
        </div>
        <div class="footer-center">
            <div class="icones">
                <a href=""><img src="/public/assets/icons/facebook.png" alt="Facebook"></a>
                <a href=""><img src="/public/assets/icons/instagram.png" alt="Instagram"></a>
                <a href=""><img src="/public/assets/icons/x.png" alt="X (Twitter)"></a>
                <a href=""><img src="/public/assets/icons/in.png" alt="LinkedIn"></a>
                <a href=""><img src="/public/assets/icons/youtube-app-white-icon 1.png" alt="YouTube"></a>
        </div>
        <span class="footer-copy">Copyright &copy; 2026 | Menthfy - Todos os direitos reservados.</span>
    </div>
    <div class="footer-right">
        <a href="#" class="topo-btn">Topo</a>
    </div>
    </div>
    <link rel="stylesheet" href="/src/styles/components/footer.css">
    <script type="module" src="/src/scripts/modules/header-auth.js"></script>
    <script type="module" src="/src/scripts/modules/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
