          </ul>
          <div>
              <h2 id="username"></h2>
              <script>
                let user = document.querySelector('#username');
                usuario = sessionStorage.getItem("usuario");

                if (usuario) {
                    user.innerHTML = usuario;
                } else {
                    user.innerHTML = "Faça login";
                }
              </script>

          </div>
